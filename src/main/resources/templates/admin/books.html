<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/head :: head('BookNest | Books Management')}">
</head>

<body>

<div class="admin-layout">

    <div th:replace="~{admin/fragments/sidebar :: sidebar}">
    </div>

    <main class="admin-content">

        <div th:replace="~{admin/fragments/header :: header('Books Management')}">
        </div>

        <div class="admin-card">

            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/admin/books/add}"
                   class="btn btn-outline-accent btn-accent-arrow">
                    + Add a book
                </a>
            </div>
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>COVER</th>
                    <th>TITLE</th>
                    <th>AUTHOR</th>
                    <th>GENRE</th>
                    <th>STATUS</th>
                    <th>FEATURED</th>
                    <th>YEAR</th>
                    <th>CREATED ON</th>
                    <th>ACTIONS</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="8" class="empty-state">
                        No books found.
                    </td>
                </tr>

                <tr th:each="book : ${books}">
                    <td th:text="${book.id}">id</td>

                    <td>
                        <img th:src="${#strings.isEmpty(book.bookImage)
                            ? '/images/product-item-no-image-cover.png'
                            : book.bookImage}"
                             alt="Cover"
                             class="book-cover-thumb">
                    </td>

                    <td th:text="${book.title}">Title</td>

                    <td th:text="${book.author}">Author</td>

                    <td th:text="${book.genre}">Genre</td>

                    <td>
                        <span class="admin-status-badge"
                              th:classappend="${
                                  book.status.name() == 'ACTIVE' ? ' status-active' :
                                  book.status.name() == 'RESERVED' ? ' status-reserved' :
                                  ' status-inactive'
                              }"
                              th:text="${book.status}">
                            ACTIVE
                        </span>
                    </td>

                    <td>
                        <span th:if="${book.featured}" style="color:#2e7d32;font-size:18px;">
                            ★
                        </span>
                        <span th:unless="${book.featured}">
                            —
                        </span>
                    </td>

                    <td th:text="${book.releaseYear}">2024</td>

                    <td th:text="${#temporals.format(book.createdOn, 'dd.MM.yyyy HH:mm')}">
                        15.06.2026 14:30
                    </td>

                    <td>
                        <a th:href="@{/admin/books/{id}/edit(id=${book.id})}"
                           class="admin-action-btn">
                            Edit
                        </a>
                        <a th:href="@{/admin/books/{id}/delete(id=${book.id})}"
                           class="admin-action-btn"
                           th:attr="onclick=|return confirm('Delete book: ${book.title}?');|">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>

    </main>

</div>

<div th:replace="~{admin/fragments/footer :: footer}">
</div>

</body>
</html>
