<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>BookNest | Register</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
          crossorigin="anonymous">

    <link rel="stylesheet" type="text/css" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/icomoon/icomoon.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/vendor.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}">
</head>

<body data-bs-spy="scroll" data-bs-target="#header" tabindex="0">

<section class="py-5 my-5">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-5">

                <div class="register-card">

                    <div class="section-header align-center">
                        <div class="title">
                            <span>Join BookNest</span>
                        </div>
                        <h2 class="section-title">Register</h2>
                    </div>

                    <div th:if="${registerError}" class="alert alert-danger">
                        Registration failed. Username or email may already exist, or passwords do not match.
                    </div>

                    <form th:action="@{/login}"
                          th:object="${userLoginRequest}"
                          method="post">

                        <div th:if="${loginError}" class="alert alert-danger">
                            Invalid username or password.
                        </div>

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control"
                                   placeholder="Username"
                                   th:field="*{username}">
                        </div>

                        <div class="mb-4">
                            <input type="password"
                                   class="form-control"
                                   placeholder="Password"
                                   th:field="*{password}">
                        </div>

                        <button type="submit"
                                class="btn btn-outline-accent btn-accent-arrow w-100">
                            Login <i class="icon icon-ns-arrow-right"></i>
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <p>
                            Don't have an account?
                            <a th:href="@{/register}">Register here</a>
                        </p>
                    </div>

                </div>

            </div>

        </div>
    </div>
</section>

<script th:src="@{/js/jquery-1.11.0.min.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
<script th:src="@{/js/plugins.js}"></script>
<script th:src="@{/js/script.js}"></script>

</body>
</html>
