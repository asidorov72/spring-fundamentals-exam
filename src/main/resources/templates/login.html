<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('BookNest | Login')}"></head>

<body data-bs-spy="scroll" data-bs-target="#header" tabindex="0">

<section class="py-5 my-5">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-5">

                <div class="register-card">

                    <div class="section-header align-center">
                        <div class="title">
                            <span>Join BookNest</span>
                        </div>
                        <h2 class="section-title">Register</h2>
                    </div>

                    <form class="auth-form"
                          th:action="@{/login}"
                          th:object="${userLoginRequest}"
                          method="post">

                        <div th:if="${loginError}" class="alert alert-danger">
                            Invalid username or password.
                        </div>

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control"
                                   placeholder="Username"
                                   th:field="*{username}">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <input type="password"
                                   class="form-control"
                                   placeholder="Password"
                                   th:field="*{password}">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>
                        </div>

                        <div class="btn-wrap text-center">
                            <button type="submit"
                                    class="btn btn-outline-accent btn-accent-arrow">
                                Login <i class="icon icon-ns-arrow-right"></i>
                            </button>
                        </div>
                    </form>

                    <div class="mt-4 text-center">
                        <p>
                            Don't have an account?
                            <a th:href="@{/register}">Register here</a>
                        </p>
                    </div>

                </div>

            </div>

        </div>
    </div>
</section>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

</body>
</html>
