<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${book.title})}"></head>

<body data-bs-spy="scroll" data-bs-target="#header" tabindex="0">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="single-product py-5 my-5">

    <div class="container">

        <div class="row">

            <div class="col-md-5">

                <div class="product-image text-center">

                    <img th:src="${book.bookImage == null or #strings.isEmpty(book.bookImage.trim())
                        ? '/images/single-no-image-cover.png'
                        : book.bookImage}"
                         th:alt="${book.title}"
                         class="img-fluid">

                </div>

            </div>

            <div class="col-md-7">

                <div class="product-detail">

                    <h1 th:text="${book.title}">
                        Book Title
                    </h1>

                    <h4 class="mb-4 text-muted"
                        th:text="${book.author}">
                        Author
                    </h4>

                    <div class="mb-3">
                        <strong>Genre:</strong>
                        <span th:text="${book.genre.displayName}">
                            Fantasy
                        </span>
                    </div>

                    <div class="mb-3">
                        <strong>Release Year:</strong>
                        <span th:text="${book.releaseYear}">
                            2025
                        </span>
                    </div>

                    <div class="mb-3" th:if="${session.user != null}">
                        <strong>Status:</strong>

                        <span th:if="${reservedByCurrentUser}"
                              class="badge bg-info text-dark">
                            Reserved by You
                        </span>

                        <span th:if="${!reservedByCurrentUser and book.status.name() == 'ACTIVE'}"
                              class="badge bg-success">
                            Available
                        </span>

                        <span th:if="${!reservedByCurrentUser and book.status.name() == 'INACTIVE'}"
                              class="badge bg-danger">
                            Unavailable
                        </span>
                    </div>

                    <div class="mb-4">
                        <strong>Rental Price:</strong>
                        <span th:text="'$ ' + ${book.rentalPrice}">
                            $ 10.00
                        </span>
                    </div>

                    <div class="mb-4">
                        <h5>Description</h5>

                        <p th:text="${book.description}">
                            Book description
                        </p>
                    </div>

                    <div th:if="${successMessage}"
                         class="alert alert-success mb-4"
                         th:text="${successMessage}">
                    </div>

                    <div th:if="${errorMessage}"
                         class="alert alert-danger mb-4"
                         th:text="${errorMessage}">
                    </div>

                    <div class="mb-4">
                        <strong>Reservation Period:</strong>
                        14 days
                    </div>

                    <div class="btn-wrap">

                        <div th:if="${session.user == null}">
                            <a th:href="@{/login}"
                               class="btn btn-outline-accent btn-accent-arrow">
                                Reserve Book
                                <i class="icon icon-ns-arrow-right"></i>
                            </a>
                        </div>

                        <div th:if="${session.user != null and !reservedByCurrentUser and book.status.name() == 'ACTIVE'}">
                            <form th:action="@{/books/{id}/reserve(id=${book.id})}"
                                  method="post">

                                <button type="submit"
                                        class="btn btn-outline-accent btn-accent-arrow">
                                    Reserve Book
                                    <i class="icon icon-ns-arrow-right"></i>
                                </button>

                            </form>
                        </div>

                        <div th:if="${session.user != null and reservedByCurrentUser}">
                            <button type="button"
                                    class="btn btn-secondary"
                                    disabled>
                                Reserved by You
                            </button>
                        </div>

                        <div th:if="${session.user != null and !reservedByCurrentUser and book.status.name() == 'INACTIVE'}">
                            <button type="button"
                                    class="btn btn-secondary"
                                    disabled>
                                Currently Unavailable
                            </button>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

</body>

</html>
