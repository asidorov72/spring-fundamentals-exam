<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!--<head th:replace="~{fragments/head :: head('Book Details')}"></head>-->
<head th:replace="~{fragments/head :: head(${book.title})}"></head>

<body data-bs-spy="scroll" data-bs-target="#header" tabindex="0">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="single-product py-5 my-5">

    <div class="container">

        <div class="row">

            <div class="col-md-5">

                <div class="product-image text-center">

                    <img th:src="${book.bookImage == null or #strings.isEmpty(book.bookImage.trim())
                        ? '/images/single-no-image-cover.png'
                        : book.bookImage}"
                         th:alt="${book.title}"
                         class="img-fluid">

                </div>

            </div>

            <div class="col-md-7">

                <div class="product-detail">

                    <h1 th:text="${book.title}">
                        Book Title
                    </h1>

                    <h4 class="mb-4 text-muted"
                        th:text="${book.author}">
                        Author
                    </h4>

                    <div class="mb-3">
                        <strong>Genre:</strong>
                        <span th:text="${book.genre.displayName}">
                            Fantasy
                        </span>
                    </div>

                    <div class="mb-3">
                        <strong>Release Year:</strong>
                        <span th:text="${book.releaseYear}">
                            2025
                        </span>
                    </div>

                    <div class="mb-3">
                        <strong>Status:</strong>
                        <span th:text="${book.status}">
                            ACTIVE
                        </span>
                    </div>

                    <div class="mb-4">
                        <strong>Rental Price:</strong>
                        <span th:text="'$ ' + ${book.rentalPrice}">
                            $ 10.00
                        </span>
                    </div>

                    <div class="mb-4">

                        <h5>Description</h5>

                        <p th:text="${book.description}">
                            Book description
                        </p>

                    </div>

                    <div class="btn-wrap">

                        <a href="#"
                           class="btn btn-outline-accent btn-accent-arrow">

                            Reserve Book

                            <i class="icon icon-ns-arrow-right"></i>

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

</body>

</html>
