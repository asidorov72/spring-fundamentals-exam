<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('My Reservations')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="py-5 my-5">

    <div class="container">

        <div class="section-header align-center">
            <div class="title">
                <span>Your reserved books</span>
            </div>
            <h2 class="section-title">My Reservations</h2>
        </div>

        <div th:if="${#lists.isEmpty(reservations)}"
             class="text-center py-5">

            <h3>No Reservations Yet</h3>

            <p class="mb-4">
                You haven't reserved any books yet.
            </p>

            <a th:href="@{/books}"
               class="btn btn-outline-accent btn-accent-arrow">
                Browse Books
                <i class="icon icon-ns-arrow-right"></i>
            </a>

        </div>

        <div class="row"
             th:unless="${#lists.isEmpty(reservations)}">

            <div class="col-md-3"
                 th:each="reservation : ${reservations}">

                <div class="product-item">

                    <figure class="product-style">

                        <img th:src="${reservation.bookImage == null or #strings.isEmpty(reservation.bookImage.trim())
                                ? '/images/product-item-no-image-cover.png'
                                : reservation.bookImage}"
                             th:alt="${reservation.bookTitle}"
                             class="book-cover-img">

                    </figure>

                    <figcaption>

                        <h3 th:text="${reservation.bookTitle}">
                            Book Title
                        </h3>

                        <span th:text="${reservation.bookAuthor}">
                            Author
                        </span>

                        <div class="mt-3">
                            <small>
                                <strong>Reserved:</strong>
                                <span th:text="${reservation.reservationDate}"></span>
                            </small>
                        </div>

                        <div>
                            <small>
                                <strong>Return:</strong>
                                <span th:text="${reservation.returnDate}"></span>
                            </small>
                        </div>

                        <div class="item-price"
                             th:text="'Rental Price: € ' + ${reservation.rentalPrice}">
                            Rental Price: € 10.00
                        </div>

                        <div class="btn-wrap mt-3">
                            <a th:href="@{/books/{id}(id=${reservation.bookId})}"
                               class="btn btn-outline-accent btn-accent-arrow">
                                View Book
                                <i class="icon icon-ns-arrow-right"></i>
                            </a>
                        </div>

                    </figcaption>

                </div>

            </div>

        </div>

    </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

</body>
</html>
