<th:block th:fragment="footerMenu">

    <div class="col-md-2">

        <div class="footer-menu">
            <h5>About BookNest</h5>
            <ul class="menu-list">
                <li class="menu-item">
                    <a th:href="@{/about}">About Us</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/contact}">Contact</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/books}">Browse Books</a>
                </li>
            </ul>
        </div>

    </div>

    <div class="col-md-2">

        <div class="footer-menu">
            <h5>Discover</h5>
            <ul class="menu-list">
                <li class="menu-item">
                    <a th:href="@{/}">Home</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/books}">Books</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/#featured-books}">Featured</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/#popular-books}">Popular</a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/#recently-added}">Recently Added</a>
                </li>
            </ul>
        </div>

    </div>

    <div class="col-md-2">

        <div class="footer-menu">
            <h5>My Account</h5>
            <ul class="menu-list">

                <li class="menu-item" th:if="${session.user == null}">
                    <a th:href="@{/login}">Login</a>
                </li>

                <li class="menu-item" th:if="${session.user == null}">
                    <a th:href="@{/register}">Register</a>
                </li>

                <li class="menu-item" th:if="${session.user != null}">
                    <a th:href="@{/reservations/my}"
                       th:text="'Reservations (' + ${reservationCount} + ')'">
                        Reservations (0)
                    </a>
                </li>

                <li class="menu-item" th:if="${session.user != null}">
                    <a th:href="@{/logout}">Logout</a>
                </li>

            </ul>
        </div>

    </div>

    <div class="col-md-2">

        <div class="footer-menu">
            <h5>Admin</h5>
            <ul class="menu-list">

                <li class="menu-item"
                    th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">

                    <a th:href="@{/admin}">
                        Admin Section
                    </a>

                </li>

                <li class="menu-item"
                    th:unless="${session.user != null and session.user.role.name() == 'ADMIN'}">

                    <span>Admin access only</span>

                </li>

            </ul>
        </div>

    </div>

</th:block>
