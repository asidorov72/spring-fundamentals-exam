<div th:fragment="recentlyAdded">

    <section id="recently-added" class="bookshelf pb-5 mb-5">

        <div class="section-header align-center">
            <div class="title">
                <span>New books in the library</span>
            </div>
            <h2 class="section-title">Recently Added</h2>
        </div>

        <div class="container">
            <div class="row">
                <div class="inner-content">
                    <div class="product-list" data-aos="fade-up">

                        <div th:if="${#lists.isEmpty(recentlyAddedBooks)}"
                             class="text-center py-5">
                            No books available.
                        </div>

                        <div class="grid product-grid" th:unless="${#lists.isEmpty(recentlyAddedBooks)}">

                            <div class="product-item" th:each="book : ${recentlyAddedBooks}">
                                <figure class="product-style">
                                    <img th:src="${book.bookImage == null or #strings.isEmpty(book.bookImage.trim())
                                        ? '/images/product-item-no-image-cover.png'
                                        : book.bookImage}"
                                         th:alt="${book.title}"
                                         class="product-item">
                                </figure>

                                <figcaption>
                                    <h3 th:text="${book.title}">Book Title</h3>
                                    <span th:text="${book.author}">Author</span>

                                    <div class="item-price" th:text="'Reserve for $ ' + ${book.rentalPrice}">
                                        Reserve for $ 10.00
                                    </div>

                                    <div class="btn-wrap mt-3">
                                        <a th:href="@{/books/{id}(id=${book.id})}"
                                           class="btn btn-outline-accent btn-accent-arrow">
                                            View Details
                                            <i class="icon icon-ns-arrow-right"></i>
                                        </a>
                                    </div>
                                </figcaption>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

    </section>

</div>
